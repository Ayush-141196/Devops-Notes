kind: Deployment
apiVersion: apps/v1
metadata:
  name: node-pod
  namespace: node-app
spec:
  replicas: 121
    selector:
    matchLabels: 
      app: node
    template:
      metadata:
        labels:
          app: node
      spec:
        containers:
        - name: node-cont
          image: node:19-slim
          command: ["npm", "start"]
          ports:
          - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "264Mi"
              cpu: "500m"


