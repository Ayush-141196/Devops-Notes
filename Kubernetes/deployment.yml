kind: Deployment
apiVersion: apps/v1
metadata:
  name: ayush
  namespace: apache
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ayush
  template:
     metadata:
       labels:
         app: ayush
spec:
    container_name: notes-app
    image: ayushamansingh/notes-app
    

